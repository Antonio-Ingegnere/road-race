[day_night]

; Enable or disable the day-night cycle. When false, the scene stays
; fixed at whatever time start_time specifies.
enabled = false

; Starting time in seconds within the 60-second cycle:
;   0.0  - 20.0  = day
;   20.0 - 30.0  = dusk
;   30.0 - 50.0  = night
;   50.0 - 60.0  = dawn
start_time = 10.0

[elk]

; Enable or disable roadside elk.
enabled = true

; Probability that an elk spawns at each 4-second interval (0.0 – 1.0).
spawn_chance = 0.8

[rain]

; Enable or disable the rain effect.
enabled = true

; Number of raindrops on screen at once (e.g. 150 = light, 300 = medium, 600 = heavy).
drop_count = 600
