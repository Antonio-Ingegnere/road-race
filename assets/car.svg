<svg xmlns="http://www.w3.org/2000/svg" width="56" height="96" viewBox="0 0 56 96">
  <!-- Car body -->
  <rect x="6" y="8" width="44" height="80" rx="10" fill="#1e4080"/>
  <!-- Hood -->
  <rect x="10" y="8" width="36" height="14" rx="6" fill="#1a3570"/>
  <!-- Trunk -->
  <rect x="10" y="74" width="36" height="10" rx="4" fill="#1a3570"/>
  <!-- Windshield -->
  <rect x="13" y="20" width="30" height="17" rx="3" fill="#a8d4f0" opacity="0.85"/>
  <!-- Rear window -->
  <rect x="13" y="61" width="30" height="14" rx="3" fill="#a8d4f0" opacity="0.7"/>
  <!-- Side windows -->
  <rect x="7" y="38" width="7" height="20" rx="2" fill="#a8d4f0" opacity="0.6"/>
  <rect x="42" y="38" width="7" height="20" rx="2" fill="#a8d4f0" opacity="0.6"/>
  <!-- Front left wheel -->
  <rect x="0" y="13" width="10" height="18" rx="4" fill="#111"/>
  <rect x="1" y="15" width="8" height="14" rx="3" fill="#2a2a2a"/>
  <!-- Front right wheel -->
  <rect x="46" y="13" width="10" height="18" rx="4" fill="#111"/>
  <rect x="47" y="15" width="8" height="14" rx="3" fill="#2a2a2a"/>
  <!-- Rear left wheel -->
  <rect x="0" y="65" width="10" height="18" rx="4" fill="#111"/>
  <rect x="1" y="67" width="8" height="14" rx="3" fill="#2a2a2a"/>
  <!-- Rear right wheel -->
  <rect x="46" y="65" width="10" height="18" rx="4" fill="#111"/>
  <rect x="47" y="67" width="8" height="14" rx="3" fill="#2a2a2a"/>
  <!-- Headlights -->
  <rect x="11" y="8" width="11" height="5" rx="2" fill="#ffffc0"/>
  <rect x="34" y="8" width="11" height="5" rx="2" fill="#ffffc0"/>
  <!-- Taillights -->
  <rect x="11" y="83" width="11" height="5" rx="2" fill="#ff3333"/>
  <rect x="34" y="83" width="11" height="5" rx="2" fill="#ff3333"/>
  <!-- Hood detail -->
  <rect x="24" y="10" width="8" height="10" rx="2" fill="#162d60" opacity="0.5"/>
</svg>
